<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            min-height: 100vh;
        }

        /* Sticky Navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 100, 0, 0.85);
            padding: 15px 30px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Hero Image */
        .hero {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
        }

        /* Main container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Card */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 20px;
            font-weight: 800;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(46,125,50,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #2e7d32, #43a047);
        }

        /* Result Card */
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #e8f5e9;
            border-left: 6px solid #2e7d32;
            animation: fadeIn 0.8s ease-in-out;
        }

        .result h2 {
            color: #1b5e20;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        🥗 NutriGuide BMI Calculator
    </div>

    <!-- Hero Image -->
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74?auto=format&fit=crop&w=1400&q=80"
             alt="BMI Health Fitness">
    </div>

    <!-- Form Card -->
    <div class="container">
        <div class="card">

            <h1>Check Your BMI</h1>

            <form action="/bmi" method="POST">
                <input type="number" step="0.01" name="weight" placeholder="Weight (kg)" required>

                <input type="number" step="0.01" name="height" placeholder="Height (m)" required>

                <button type="submit">Calculate BMI</button>
            </form>

            {% if bmi is not none %}
            <div class="result">
                <h2>Your BMI: {{ bmi }}</h2>
                <p>
                    {% if bmi < 18.5 %}
                        Category: Underweight
                    {% elif bmi < 25 %}
                        Category: Normal weight
                    {% elif bmi < 30 %}
                        Category: Overweight
                    {% else %}
                        Category: Obese
                    {% endif %}
                </p>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
