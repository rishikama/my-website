<!DOCTYPE html>
<html>
<head>
    <title>Calorie Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: url("https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 80, 0, 0.35);
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 100, 0, 0.9);
            color: white;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* Hero Image */
        .hero {
            width: 100%;
            height: 240px;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
        }

        /* Center container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.95);
            width: 430px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        h1 {
            text-align: center;
            color: #1b5e20;
            margin-bottom: 20px;
            font-weight: 900;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(46,125,50,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #2e7d32, #43a047);
        }

        /* Result box */
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #e8f5e9;
            border-left: 6px solid #2e7d32;
            animation: fadeIn 0.8s ease-in-out;
        }

        .result h2 {
            color: #1b5e20;
            margin-bottom: 5px;
        }

        .result p {
            color: #2e7d32;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        NutriGuide Calorie Calculator
    </div>

    <!-- Hero Image -->
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=1400&q=80"
             alt="Healthy Food Calories Nutrition">
    </div>

    <!-- Form -->
    <div class="container">
        <div class="card">

            <h1>Daily Calorie Calculator</h1>

            <form method="POST">

                <input type="number" name="age" placeholder="Age" required>

                <input type="number" step="0.01" name="weight" placeholder="Weight (kg)" required>

                <input type="number" step="0.01" name="height" placeholder="Height (cm)" required>

                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>

                <select name="activity" required>
                    <option value="">Select Activity Level</option>
                    <option value="1.2">Sedentary</option>
                    <option value="1.375">Lightly Active</option>
                    <option value="1.55">Moderately Active</option>
                    <option value="1.725">Very Active</option>
                    <option value="1.9">Extra Active</option>
                </select>

                <button type="submit">Calculate Calories</button>

            </form>

            {% if calories %}
            <div class="result">
                <h2>Your Daily Calories Needed: {{ calories }} kcal</h2>
                <p>
                    This value represents your Total Daily Energy Expenditure (TDEE) based on your activity level.
                </p>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
