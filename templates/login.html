<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Soft professional background */
        body {
            background: url("https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Dark overlay (keeps background subtle) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 50, 0, 0.25);
            z-index: -1;
        }

        /* Sticky navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 100, 0, 0.92);
            color: white;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar span {
            color: #a5d6a7;
        }

        /* Page title */
        h1 {
            text-align: center;
            margin-top: 30px;
            color: #1b5e20;
            font-weight: 900;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.2);
        }

        /* Center container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Login card */
        .card {
            background: rgba(255,255,255,0.95);
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(46,125,50,0.3);
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #2e7d32, #43a047);
        }

        /* Small subtitle style (optional improvement) */
        .subtitle {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        NutriGuide <span>Login Portal</span>
    </div>

    <!-- Title -->
    <h1>User Login</h1>
    <p class="subtitle">Access your personalized health dashboard</p>

    <!-- Login Card -->
    <div class="container">
        <div class="card">

            <form method="POST">

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

                <button type="submit">Login</button>

            </form>

        </div>
    </div>

</body>
</html>
