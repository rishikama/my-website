<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background */
        body {
            background: url("https://images.unsplash.com/photo-1580281657527-47f249e8f84d?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dark green overlay gradient (better readability) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(0, 60, 20, 0.75),
                rgba(0, 0, 0, 0.55)
            );
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            padding: 16px 30px;
            background: rgba(0, 80, 0, 0.75);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Title section */
        .header {
            text-align: center;
            margin-top: 30px;
            animation: fadeDown 1s ease;
        }

        .header h1 {
            color: #eaffea;
            font-size: 36px;
        }

        .header p {
            color: #c8facc;
            margin-top: 6px;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Center container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Glass card */
        .card {
            width: 440px;
            padding: 30px;
            border-radius: 22px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
            animation: popIn 0.8s ease;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus, select:focus {
            background: rgba(255,255,255,0.25);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(100,255,150,0.4);
        }

        /* Dropdown styling */
        select {
            color: white;
        }

        option {
            color: black;
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: linear-gradient(90deg, #00c853, #64dd17);
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #43a047, #00c853);
        }

        /* Small helper text */
        .subtitle {
            text-align: center;
            color: #c8facc;
            margin-top: 6px;
        }

        /* Field grouping labels */
        .label {
            color: #eaffea;
            font-size: 13px;
            margin-top: 8px;
            display: block;
        }

    </style>
</head>

<body>

    <div class="navbar">
        🌿 NUTRIGUIDE HEALTH PROFILE
    </div>

    <div class="header">
        <h1>Your Health Profile</h1>
        <p>Track your body metrics & wellness goals</p>
    </div>

    <div class="container">
        <div class="card">

            <form method="POST">

                <label class="label">Username</label>
                <input type="text" name="username" placeholder="Enter username" required>

                <label class="label">Age</label>
                <input type="number" name="age" placeholder="Enter age" required>

                <label class="label">Gender</label>
                <input type="text" name="gender" placeholder="Male / Female / Other" required>

                <label class="label">Weight (kg)</label>
                <input type="number" step="0.01" name="weight" placeholder="e.g. 60" required>

                <label class="label">Height (cm)</label>
                <input type="number" step="0.01" name="height" placeholder="e.g. 165" required>

                <label class="label">Fitness Goal</label>
                <select name="goal">
                    <option value="loss">Weight Loss</option>
                    <option value="maintain">Maintain Weight</option>
                    <option value="gain">Weight Gain</option>
                </select>

                <button type="submit">Save Profile</button>

            </form>

        </div>
    </div>

</body>
</html>
