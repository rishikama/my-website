<!DOCTYPE html>
<html>
<head>
    <title>Fitness Goal Planner</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background image */
        body {
            background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 70, 0, 0.35);
            z-index: -1;
        }

        /* Sticky navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 100, 0, 0.92);
            color: white;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* Page title */
        h1 {
            text-align: center;
            margin-top: 20px;
            color: #1b5e20;
            font-weight: 900;
        }

        /* Center container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.96);
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #c8e6c9;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 8px rgba(46,125,50,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #2e7d32, #43a047);
        }

        /* Result box */
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #e8f5e9;
            border-left: 6px solid #2e7d32;
            animation: fadeIn 0.8s ease;
        }

        .result h2 {
            color: #1b5e20;
            margin-bottom: 5px;
        }

        .result h3 {
            color: #2e7d32;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        NutriGuide Fitness Goal Planner
    </div>

    <!-- Page Title -->
    <h1>Fitness Goal Planner</h1>

    <!-- Form -->
    <div class="container">
        <div class="card">

            <form method="POST">

                <input type="number" name="calories"
                       placeholder="Your Daily Maintenance Calories"
                       required>

                <select name="goal" required>
                    <option value="">Select Goal</option>
                    <option value="loss">Weight Loss</option>
                    <option value="maintain">Maintain Weight</option>
                    <option value="gain">Weight Gain</option>
                </select>

                <button type="submit">Generate Plan</button>

            </form>

            {% if target %}
            <div class="result">
                <h2>Target Calories: {{ target }} kcal/day</h2>
                <h3>{{ message }}</h3>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
